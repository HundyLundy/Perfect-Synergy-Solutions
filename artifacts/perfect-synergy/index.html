<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary identity — this is what Google and browsers show -->
    <title>Perfect Synergy Solutions | Parking Revenue & Water Savings</title>
    <meta name="description" content="Perfect Synergy Solutions helps hotels, hospitals, and commercial real estate owners monetize their parking and slash water bills by 20%. Two problems. One perfect solution." />

    <!-- Open Graph — what LinkedIn, Slack, iMessage previews show -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Perfect Synergy Solutions" />
    <meta property="og:description" content="Turn parking into profits. Cut your water bill by 20%. Hotels, hospitals, and commercial properties — we fix both." />
    <meta property="og:url" content="https://perfectsynergypartners.com" />
    <meta property="og:site_name" content="Perfect Synergy Solutions" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Perfect Synergy Solutions" />
    <meta name="twitter:description" content="Parking revenue + water savings = Perfect Synergy. Hotels, hospitals, commercial real estate." />

    <!-- Tell search engines our real name -->
    <meta name="application-name" content="Perfect Synergy Solutions" />
    <meta name="author" content="Perfect Synergy Solutions" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v19.0"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
